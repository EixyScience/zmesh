[node]
id = node-01
site = site-a

[lan]
udp_listen = 0.0.0.0:48080
udp_peers  =

[wan]
enabled = true
listen  = 0.0.0.0:48443
; peers は governor 間の URL を列挙（ポートは自由に変更可能）
peers   = http://127.0.0.1:48443

[role]
prime = false
governor = true

[scalefs]
id = 01963b5c-7d3a-7a3a-8d8c-0e3b63b9d2c1

[paths]
# ZMESH:STATE: default is next to this conf file (./zmesh.state)
state_dir = ./zmesh.state

# ZMESH:WATCH: default watch main only
watch_root = ./main

# Exclude patterns (optional). Recommend excluding state_dir if it is under watch_root.
# watch_exclude = zmesh.state/**, .zmesh/**, .git/**, **/*.swp
watch_exclude = ./zmesh.state/**
